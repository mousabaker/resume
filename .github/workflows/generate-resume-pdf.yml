name: Generate Resume PDF

on:
  # allows manual execution of this workflow from the Actions tab
  workflow_dispatch:

  push:
    branches:
      - master

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install markdown-pdf
        run: npm install -g markdown-pdf

      - name: Generate PDF from Markdown
        run: markdown-pdf index.md -o resume-mousa.pdf

      - name: Commit PDF to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add resume.pdf
          git commit -m "Update PDF resume from Markdown" || echo "No changes to commit"
          git push
